<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>STS2 Trace Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --panel: #ffffff;
      --panel-soft: #f9fafc;
      --ink: #172033;
      --muted: #66758a;
      --line: #d5deea;
      --blue: #2563a7;
      --green: #2f855a;
      --orange: #b85c00;
      --red: #b42318;
      --purple: #6956b8;
      --shadow: 0 12px 34px rgba(19, 31, 49, 0.08);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
    }

    button:hover {
      border-color: #9fb1c8;
      background: #f7faff;
    }

    button.active {
      border-color: var(--blue);
      background: #eaf3ff;
      color: #174b82;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .control select,
    .control input[type="file"] {
      max-width: 270px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 8px;
      background: #fff;
      color: var(--ink);
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      max-width: 1560px;
      width: 100%;
      margin: 0 auto;
    }

    aside,
    main {
      min-width: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .side {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      height: calc(100vh - 92px);
      position: sticky;
      top: 76px;
    }

    .side-head {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .stat {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      padding: 8px;
    }

    .stat b {
      display: block;
      font-size: 18px;
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .replay-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 10px;
    }

    .replay-controls .wide {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      gap: 7px;
      color: var(--muted);
      font-size: 12px;
    }

    .steps {
      overflow: auto;
      padding: 8px;
    }

    .step {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) auto;
      gap: 8px;
      width: 100%;
      text-align: left;
      border-radius: 6px;
      margin: 0 0 6px;
      padding: 9px;
      align-items: center;
    }

    .step-num {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .step-main {
      min-width: 0;
    }

    .step-main strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .step-main span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-width: 44px;
      justify-content: center;
      border-radius: 999px;
      padding: 3px 7px;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
    }

    .status.ok {
      background: var(--green);
    }

    .status.err {
      background: var(--red);
    }

    .status.wait {
      background: var(--orange);
    }

    .status.unknown {
      background: #64748b;
    }

    .status.info {
      background: var(--blue);
    }

    .content {
      display: grid;
      gap: 14px;
    }

    .summary {
      padding: 16px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 74px;
      background: #fff;
    }

    .metric span {
      color: var(--muted);
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
    }

    .metric b {
      display: block;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
      overflow-x: auto;
    }

    .details-body {
      padding: 14px;
      min-height: 520px;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .block {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      min-width: 0;
    }

    .block h2 {
      margin: 0;
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--line);
      background: #f4f7fb;
    }

    pre {
      margin: 0;
      padding: 12px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      overflow: auto;
      max-height: 620px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.45;
      color: #d8e2f0;
      background: #111827;
    }

    .message {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 10px;
      background: #fff;
    }

    .message-role {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 11px;
      background: #f4f7fb;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .message pre {
      max-height: 360px;
    }

    .attempts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .empty {
      border: 1px dashed #b7c3d3;
      color: var(--muted);
      background: #fbfcfe;
      border-radius: 8px;
      padding: 22px;
      text-align: center;
    }

    .kv {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 8px;
      font-size: 13px;
      margin: 0 0 9px;
    }

    .kv dt {
      color: var(--muted);
    }

    .kv dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    .replay-grid,
    .annotation-grid {
      display: grid;
      grid-template-columns: minmax(0, 1.1fr) minmax(0, 0.9fr);
      gap: 12px;
    }

    .state-summary,
    .action-list,
    .form-stack {
      display: grid;
      gap: 10px;
      padding: 12px;
    }

    .state-card,
    .action-option {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px;
      min-width: 0;
    }

    .state-card h3,
    .action-option h3 {
      margin: 0 0 6px;
      font-size: 13px;
    }

    .state-card p,
    .state-card ul {
      margin: 0;
      color: var(--ink);
      font-size: 13px;
      line-height: 1.45;
    }

    .state-card ul {
      padding-left: 18px;
    }

    .action-option {
      display: grid;
      gap: 6px;
      text-align: left;
      width: 100%;
    }

    .action-option.selected {
      border-color: var(--blue);
      background: #f0f7ff;
    }

    .action-meta {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
      color: var(--muted);
      font-size: 12px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 3px 7px;
      background: #eef2f7;
      color: #475569;
      font-family: var(--mono);
      font-size: 11px;
    }

    .form-row {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .form-row input,
    .form-row select,
    .form-row textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 9px 10px;
      background: #fff;
      color: var(--ink);
      font-weight: 400;
    }

    .form-row textarea {
      min-height: 180px;
      resize: vertical;
      line-height: 1.45;
    }

    .save-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .save-status {
      color: var(--muted);
      font-size: 12px;
    }

    .save-status.ok {
      color: var(--green);
      font-weight: 700;
    }

    .save-status.err {
      color: var(--red);
      font-weight: 700;
    }

    @media (max-width: 1050px) {
      .layout,
      .split,
      .replay-grid,
      .annotation-grid {
        grid-template-columns: 1fr;
      }

      .side {
        height: auto;
        position: static;
      }

      .steps {
        max-height: 340px;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      header {
        display: grid;
      }

      .controls {
        justify-content: flex-start;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .kv {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>STS2 Trace Viewer</h1>
        <div class="subtitle" id="sourceLabel">No trace loaded</div>
      </div>
      <div class="controls">
        <label class="control">Log
          <select id="logSelect">
            <option value="">No server logs found</option>
          </select>
        </label>
        <button id="refreshButton" type="button">Refresh</button>
        <label class="control">Auto
          <input id="autoRefresh" type="checkbox">
        </label>
        <label class="control">File
          <input id="fileInput" type="file" accept=".jsonl,application/jsonl,text/plain">
        </label>
      </div>
    </header>

    <div class="layout">
      <aside class="panel side">
        <div class="side-head">
          <div class="stats">
            <div class="stat"><b id="recordCount">0</b><span>records</span></div>
            <div class="stat"><b id="errorCount">0</b><span>errors</span></div>
            <div class="stat"><b id="actionCount">0</b><span>actions</span></div>
            <div class="stat"><b id="tokenCount">0</b><span>tokens</span></div>
          </div>
          <div class="replay-controls">
            <button id="prevStep" type="button">Previous</button>
            <button id="nextStep" type="button">Next</button>
            <label class="wide">
              <input id="modelOnly" type="checkbox" checked>
              Step through model decisions only
            </label>
          </div>
        </div>
        <div id="steps" class="steps">
          <div class="empty">Load a trace log.</div>
        </div>
      </aside>

      <main class="content">
        <section class="panel summary">
          <div class="summary-grid">
            <div class="metric"><span>Step</span><b id="metricStep">-</b></div>
            <div class="metric"><span>State</span><b id="metricState">-</b></div>
            <div class="metric"><span>Action</span><b id="metricAction">-</b></div>
            <div class="metric"><span>Result</span><b id="metricResult">-</b></div>
            <div class="metric"><span>Reasoning</span><b id="metricReasoning">-</b></div>
          </div>
        </section>

        <section class="panel">
          <div class="tabs" id="tabs">
            <button type="button" data-tab="overview" class="active">Overview</button>
            <button type="button" data-tab="replay">Replay</button>
            <button type="button" data-tab="dpo">DPO</button>
            <button type="button" data-tab="prompt">Prompt</button>
            <button type="button" data-tab="reasoning">Reasoning</button>
            <button type="button" data-tab="action">Action</button>
            <button type="button" data-tab="state">State</button>
            <button type="button" data-tab="result">Result</button>
            <button type="button" data-tab="raw">Raw</button>
          </div>
          <div class="details-body" id="details">
            <div class="empty">Select a step.</div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    const app = {
      records: [],
      parseErrors: [],
      selected: 0,
      activeTab: "overview",
      source: "",
      logName: "",
      serverAvailable: false,
      refreshTimer: null,
      modelOnly: true,
      drafts: {}
    };

    const el = {
      sourceLabel: document.getElementById("sourceLabel"),
      logSelect: document.getElementById("logSelect"),
      refreshButton: document.getElementById("refreshButton"),
      autoRefresh: document.getElementById("autoRefresh"),
      fileInput: document.getElementById("fileInput"),
      prevStep: document.getElementById("prevStep"),
      nextStep: document.getElementById("nextStep"),
      modelOnly: document.getElementById("modelOnly"),
      recordCount: document.getElementById("recordCount"),
      errorCount: document.getElementById("errorCount"),
      actionCount: document.getElementById("actionCount"),
      tokenCount: document.getElementById("tokenCount"),
      steps: document.getElementById("steps"),
      tabs: document.getElementById("tabs"),
      details: document.getElementById("details"),
      metricStep: document.getElementById("metricStep"),
      metricState: document.getElementById("metricState"),
      metricAction: document.getElementById("metricAction"),
      metricResult: document.getElementById("metricResult"),
      metricReasoning: document.getElementById("metricReasoning")
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function pretty(value) {
      if (value === undefined) return "";
      try {
        return JSON.stringify(value, null, 2);
      } catch {
        return String(value);
      }
    }

    function parseJsonl(text) {
      const records = [];
      const errors = [];
      text.split(/\r?\n/).forEach((line, index) => {
        if (!line.trim()) return;
        try {
          records.push(JSON.parse(line));
        } catch (error) {
          errors.push({ line: index + 1, error: String(error), text: line });
        }
      });
      return { records, errors };
    }

    function recordKind(record) {
      if (record?.phase === "eval_setup") return "setup";
      if (record?.phase === "post_action_settle") return "settle";
      return "step";
    }

    function isModelStep(record) {
      return recordKind(record) === "step";
    }

    function stateTypeOf(record) {
      return record?.state?.state_type || record?.state_for_prompt?.state_type || "unknown";
    }

    function resultStatus(record) {
      const kind = recordKind(record);
      if (kind === "setup") {
        if (record.result && typeof record.result === "object") return record.result.status || "setup";
        return "setup";
      }
      if (kind === "settle") return "settled";
      if (record.error) return "error";
      const result = record.result;
      if (result && typeof result === "object") return result.status || "object";
      if (result === undefined || result === null) return "unknown";
      return typeof result;
    }

    function statusClass(status) {
      if (status === "ok" || status === "dry_run" || status === "stopped") return "ok";
      if (status === "wait") return "wait";
      if (status === "error") return "err";
      if (status === "setup" || status === "settled") return "info";
      return "unknown";
    }

    function attempts(record) {
      const traceAttempts = record?.model_trace?.attempts;
      if (Array.isArray(traceAttempts) && traceAttempts.length) return traceAttempts;
      return [{
        attempt: 1,
        request: record.model_request,
        response: { usage: record.llm_usage },
        raw_text: record.model_text || "",
        parsed: record.parsed,
        normalized: {
          action: record.parsed?.action || record.parsed?.tool || "",
          args: record.parsed?.args || record.parsed?.arguments || {},
          rationale: record.parsed?.rationale || ""
        },
        validation_error: record.error || null
      }];
    }

    function finalAttempt(record) {
      const list = attempts(record);
      const finalIndex = Number(record?.model_trace?.final_attempt || list.length) - 1;
      return list[Math.max(0, Math.min(finalIndex, list.length - 1))] || list[0];
    }

    function actionOf(record) {
      const attempt = finalAttempt(record);
      return attempt?.normalized?.action || record.parsed?.action || record.parsed?.tool || "none";
    }

    function displayStepLabel(record, index) {
      const kind = recordKind(record);
      if (kind === "setup") return "setup";
      if (kind === "settle") return `#${record.step ?? index + 1} settle`;
      return `#${record.step ?? index + 1}`;
    }

    function displayActionOf(record) {
      const kind = recordKind(record);
      if (kind === "setup") return record.event || "eval_setup";
      if (kind === "settle") return record.action ? `settled after ${record.action}` : "settled";
      return actionOf(record);
    }

    function displaySubtext(record) {
      const kind = recordKind(record);
      if (kind === "setup") {
        const result = record.result;
        return result?.message || record.event || "eval setup";
      }
      if (kind === "settle") return "post-action state poll";
      return finalAttempt(record)?.normalized?.rationale || record.error || "";
    }

    function recordIdentity(record, index) {
      if (!record) return "";
      return [
        recordKind(record),
        record.step ?? "",
        record.phase ?? "",
        record.event ?? "",
        actionOf(record),
        index
      ].join("|");
    }

    function argsOf(record) {
      const attempt = finalAttempt(record);
      return attempt?.normalized?.args || record.parsed?.args || record.parsed?.arguments || {};
    }

    function actionIdOf(record) {
      const attempt = finalAttempt(record);
      return attempt?.normalized?.action_id || record.parsed?.action_id || "";
    }

    function usageOf(record) {
      const attempt = finalAttempt(record);
      return attempt?.response?.usage || record.llm_usage || {};
    }

    function rawTextOf(record, attempt = finalAttempt(record)) {
      const message = attempt?.response?.message;
      const content = message?.content;
      if (attempt?.raw_text) return attempt.raw_text;
      if (typeof content === "string") return content;
      if (Array.isArray(content)) {
        return content.map((part) => typeof part === "object" ? (part.text || "") : String(part)).join("");
      }
      return record.model_text || "";
    }

    function splitReasoning(record, attempt = finalAttempt(record)) {
      const message = attempt?.response?.message || {};
      const explicit = [
        message.reasoning_content,
        message.reasoning,
        message.thinking,
        message.think
      ].filter((value) => typeof value === "string" && value.trim()).join("\n\n");
      const text = rawTextOf(record, attempt);
      const thinkBlocks = [...String(text).matchAll(/<think>([\s\S]*?)<\/think>/gi)]
        .map((match) => match[1].trim())
        .filter(Boolean)
        .join("\n\n");
      const reasoning = explicit || thinkBlocks;
      const finalText = String(text).replace(/<think>[\s\S]*?<\/think>/gi, "").trim();
      return { reasoning, finalText };
    }

    function validActionsOf(record) {
      const topLevel = record?.valid_actions;
      if (Array.isArray(topLevel) && topLevel.length) return topLevel;
      const traceActions = record?.model_trace?.valid_actions;
      if (Array.isArray(traceActions)) return traceActions;
      return [];
    }

    function selectedLegalAction(record) {
      const actionId = actionIdOf(record);
      return validActionsOf(record).find((action) => action.id === actionId) || null;
    }

    function formatArgs(args) {
      const text = pretty(args || {});
      return text === "{}" ? "{}" : text;
    }

    function compactList(items, formatter, emptyText = "none") {
      if (!Array.isArray(items) || !items.length) return emptyText;
      return items.map(formatter).filter(Boolean).join(", ") || emptyText;
    }

    function cardName(card, index) {
      const name = card?.name || card?.card_name || card?.id || `card ${index}`;
      const parts = [`#${card?.index ?? index}: ${name}`];
      if (card?.type) parts.push(card.type);
      if (card?.cost !== undefined) parts.push(`cost ${card.cost}`);
      if (card?.can_play !== undefined) parts.push(card.can_play ? "playable" : "not playable");
      if (card?.damage !== undefined) parts.push(`${card.damage} dmg`);
      if (card?.block !== undefined) parts.push(`${card.block} block`);
      return parts.join(" | ");
    }

    function namedThing(item, index) {
      if (typeof item === "string") return item;
      const name = item?.name || item?.title || item?.id || `item ${index}`;
      const detail = item?.counter !== undefined && item?.counter !== null ? ` (${item.counter})` : "";
      return `${name}${detail}`;
    }

    function potionName(potion, index) {
      if (typeof potion === "string") return potion;
      const slot = potion?.slot !== undefined ? `#${potion.slot}: ` : `#${index}: `;
      const name = potion?.name || potion?.id || "potion";
      const target = potion?.target_type ? ` | ${potion.target_type}` : "";
      return `${slot}${name}${target}`;
    }

    function numericCount(value) {
      return Number.isFinite(Number(value)) ? Number(value) : 0;
    }

    function deckTotalText(player) {
      const deck = Array.isArray(player.deck) ? player.deck : Array.isArray(player.master_deck) ? player.master_deck : null;
      if (deck) return `${deck.length} cards`;
      if (Number.isFinite(Number(player.deck_count))) return `${Number(player.deck_count)} cards`;

      const handCount = Array.isArray(player.hand) ? player.hand.length : 0;
      const drawCount = Number.isFinite(Number(player.draw_pile_count)) ? Number(player.draw_pile_count) : Array.isArray(player.draw_pile) ? player.draw_pile.length : null;
      const discardCount = Number.isFinite(Number(player.discard_pile_count)) ? Number(player.discard_pile_count) : Array.isArray(player.discard_pile) ? player.discard_pile.length : null;
      const exhaustCount = Number.isFinite(Number(player.exhaust_pile_count)) ? Number(player.exhaust_pile_count) : Array.isArray(player.exhaust_pile) ? player.exhaust_pile.length : null;
      const knownCounts = [drawCount, discardCount, exhaustCount].filter((count) => count !== null);
      if (!knownCounts.length && !handCount) return "";

      const total = handCount + numericCount(drawCount) + numericCount(discardCount) + numericCount(exhaustCount);
      const pieces = [
        drawCount !== null ? `draw ${drawCount}` : "",
        `hand ${handCount}`,
        discardCount !== null ? `discard ${discardCount}` : "",
        exhaustCount !== null ? `exhaust ${exhaustCount}` : ""
      ].filter(Boolean).join(", ");
      return `${total} cards (${pieces})`;
    }

    function combatHandText(player, battle) {
      const hand = Array.isArray(player.hand) ? player.hand : battle && Array.isArray(battle.hand) ? battle.hand : [];
      if (hand.length) return compactList(hand, cardName);
      if (battle?.is_play_phase === false) return "none (draw/resolution pending)";
      return "none";
    }

    function enemyName(enemy, index) {
      const name = enemy?.name || enemy?.id || `enemy ${index}`;
      const hp = enemy?.hp ?? enemy?.current_hp;
      const maxHp = enemy?.max_hp;
      const hpText = hp !== undefined ? `HP ${hp}${maxHp !== undefined ? `/${maxHp}` : ""}` : "HP ?";
      const block = enemy?.block ? `block ${enemy.block}` : "";
      const intent = enemy?.intent || enemy?.intent_type || enemy?.move || "";
      const damage = enemy?.intent_damage ?? enemy?.damage ?? enemy?.attack_damage;
      const damageText = damage !== undefined ? `damage ${damage}` : "";
      return [name, hpText, block, intent, damageText].filter(Boolean).join(" | ");
    }

    function stateSections(record) {
      const state = record?.state || record?.state_for_prompt || {};
      const sections = [];
      const run = state.run || {};
      const player = state.player || {};
      const runLine = [
        run.act !== undefined ? `Act ${run.act}` : "",
        run.floor !== undefined ? `Floor ${run.floor}` : "",
        run.ascension !== undefined ? `A${run.ascension}` : ""
      ].filter(Boolean).join(" | ");
      const playerLine = [
        player.character,
        player.hp !== undefined ? `HP ${player.hp}/${player.max_hp ?? "?"}` : "",
        player.block ? `block ${player.block}` : "",
        player.energy !== undefined ? `energy ${player.energy}/${player.max_energy ?? "?"}` : "",
        player.gold !== undefined ? `${player.gold} gold` : "",
        deckTotalText(player) ? `deck ${deckTotalText(player)}` : ""
      ].filter(Boolean).join(" | ");
      if (runLine || playerLine) {
        sections.push({
          title: "Run",
          lines: [
            runLine,
            playerLine,
            `Relics: ${compactList(player.relics, namedThing)}`,
            `Potions: ${compactList(player.potions, potionName)}${player.max_potion_slots !== undefined ? ` (${Array.isArray(player.potions) ? player.potions.length : 0}/${player.max_potion_slots} slots)` : ""}`
          ].filter(Boolean)
        });
      }

      const battle = state.battle || state.combat;
      if (battle && typeof battle === "object") {
        const energy = battle.energy ?? battle.player_energy ?? player.energy ?? state.energy;
        const turn = battle.turn !== undefined ? `Turn ${battle.turn}` : "";
        const combatLine = [
          turn,
          battle.round !== undefined ? `Round ${battle.round}` : "",
          battle.is_play_phase !== undefined ? (battle.is_play_phase ? "play phase" : "not play phase") : "",
          energy !== undefined ? `Energy ${energy}${player.max_energy !== undefined ? `/${player.max_energy}` : ""}` : ""
        ].filter(Boolean).join(" | ");
        sections.push({
          title: "Combat",
          lines: [
            combatLine,
            `Enemies: ${compactList(battle.enemies, enemyName)}`,
            `Hand: ${combatHandText(player, battle)}`
          ].filter(Boolean)
        });
      }

      const event = state.event;
      if (event && typeof event === "object") {
        sections.push({
          title: `Event: ${event.event_name || event.event_id || "event"}`,
          lines: [
            event.body,
            `Options: ${compactList(event.options, (option) => {
              const title = option?.title || option?.name || `option ${option?.index}`;
              const desc = option?.description ? ` - ${option.description}` : "";
              return `#${option?.index ?? "?"}: ${title}${desc}`;
            })}`
          ].filter(Boolean)
        });
      }

      const rewards = state.rewards;
      if (rewards && typeof rewards === "object") {
        sections.push({
          title: "Rewards",
          lines: [
            `Items: ${compactList(rewards.items, (item) => `#${item?.index ?? "?"}: ${item?.name || item?.type || item?.id || "reward"}`)}`,
            `Cards: ${compactList(rewards.card_choices || rewards.cards, cardName)}`
          ].filter(Boolean)
        });
      }

      const cardSelect = state.card_select || state.card_selection || state.deck_select;
      if (cardSelect && typeof cardSelect === "object") {
        sections.push({
          title: "Card Selection",
          lines: [
            cardSelect.screen_type ? `Screen: ${cardSelect.screen_type}` : "",
            cardSelect.can_confirm !== undefined ? `Can confirm: ${cardSelect.can_confirm}` : "",
            `Cards: ${compactList(cardSelect.cards || cardSelect.deck || cardSelect.options, cardName)}`
          ].filter(Boolean)
        });
      }

      const map = state.map;
      if (map && typeof map === "object") {
        const pos = map.current_position;
        sections.push({
          title: "Map",
          lines: [
            pos ? `Current: row ${pos.row ?? "?"}, col ${pos.col ?? "?"}, ${pos.type || "unknown"}` : "",
            map.next_option_count !== undefined ? `${map.next_option_count} next path options` : "",
            map.boss?.name ? `Boss: ${map.boss.name}` : ""
          ].filter(Boolean)
        });
      }

      if (state.menu_screen) {
        sections.push({ title: "Menu", lines: [`Screen: ${state.menu_screen}`, `Options: ${compactList(state.options, (option) => option)}`] });
      }

      if (!sections.length) {
        sections.push({ title: "State", lines: [`State type: ${stateTypeOf(record)}`] });
      }
      return sections;
    }

    function renderReadableState(record) {
      return `
        <div class="state-summary">
          ${stateSections(record).map((section) => `
            <div class="state-card">
              <h3>${escapeHtml(section.title)}</h3>
              <ul>${section.lines.map((line) => `<li>${escapeHtml(line)}</li>`).join("")}</ul>
            </div>
          `).join("")}
        </div>
      `;
    }

    function renderActionOption(action, selectedId = "", button = true) {
      const tag = button ? "button" : "div";
      const selected = action.id === selectedId ? " selected" : "";
      const attrs = button ? ` type="button" data-use-action-id="${escapeHtml(action.id || "")}"` : "";
      return `
        <${tag} class="action-option${selected}"${attrs}>
          <div class="action-meta">
            <span class="pill">${escapeHtml(action.id || "no-id")}</span>
            <span>${escapeHtml(action.category || "action")}</span>
            <span>${escapeHtml(action.tool || "")}</span>
          </div>
          <h3>${escapeHtml(action.summary || action.id || "Action")}</h3>
          <code>${escapeHtml(formatArgs(action.args || {}))}</code>
        </${tag}>
      `;
    }

    function firstSentence(text, maxChars = 180) {
      const value = String(text || "").trim();
      if (!value) return "";
      const match = value.match(/^.*?[.!?](?:\s|$)/);
      const sentence = (match ? match[0] : value).trim();
      return sentence.length <= maxChars ? sentence : `${sentence.slice(0, maxChars - 1).trim()}...`;
    }

    function draftKey(record, index = app.selected) {
      return recordIdentity(record, index);
    }

    function draftFor(record, index = app.selected) {
      const key = draftKey(record, index);
      if (!app.drafts[key]) {
        app.drafts[key] = {
          chosenActionId: "",
          rationale: "",
          reasoning: "",
          notes: "",
          status: ""
        };
      }
      return app.drafts[key];
    }

    function setDraftAction(record, actionId) {
      const draft = draftFor(record);
      draft.chosenActionId = actionId;
      const action = validActionsOf(record).find((item) => item.id === actionId);
      if (action && !draft.rationale.trim()) {
        draft.rationale = firstSentence(action.summary || action.id, 120);
      }
    }

    function assistantContent(reasoning, actionId, rationale) {
      const finalJson = JSON.stringify({ action_id: actionId, rationale: rationale || "" });
      const trimmed = String(reasoning || "").trim();
      if (!trimmed) return finalJson;
      return `<think>\n${trimmed}\n</think>\n\n${finalJson}`;
    }

    function rejectedDecision(record) {
      const attempt = finalAttempt(record);
      const split = splitReasoning(record, attempt);
      return {
        action_id: actionIdOf(record),
        action: attempt?.normalized?.action || "",
        args: attempt?.normalized?.args || {},
        rationale: attempt?.normalized?.rationale || "",
        reasoning: split.reasoning,
        final_text: split.finalText,
        raw_text: rawTextOf(record, attempt),
        validation_error: attempt?.validation_error || null
      };
    }

    function buildDpoAnnotation(record) {
      const draft = draftFor(record);
      const actions = validActionsOf(record);
      const chosenAction = actions.find((action) => action.id === draft.chosenActionId);
      if (!chosenAction) throw new Error("Choose the corrected action first.");
      const reasoning = draft.reasoning.trim();
      if (!reasoning) throw new Error("Add human reasoning before saving.");
      const rationale = draft.rationale.trim() || firstSentence(chosenAction.summary || chosenAction.id, 120);
      const attempt = finalAttempt(record);
      const promptMessages = attempt?.request?.messages || [];
      const rejected = rejectedDecision(record);
      const chosen = {
        action_id: chosenAction.id,
        action: chosenAction.tool || "",
        args: chosenAction.args || {},
        rationale,
        reasoning,
        final_text: JSON.stringify({ action_id: chosenAction.id, rationale }),
        assistant_content: assistantContent(reasoning, chosenAction.id, rationale)
      };
      const rejectedContent = rejected.raw_text || assistantContent(rejected.reasoning, rejected.action_id, rejected.rationale);
      return {
        kind: "sts2_dpo_annotation",
        schema_version: 1,
        created_at: new Date().toISOString(),
        source: {
          log_name: app.logName || "",
          source_label: app.source || "",
          record_index: app.selected,
          step: record.step ?? null,
          record_kind: recordKind(record),
          model: attempt?.request?.model || "",
          llm_url: attempt?.request?.llm_url || ""
        },
        prompt: {
          metadata: record?.model_trace?.prompt || attempt?.request?.prompt || {},
          messages: promptMessages
        },
        game_state: record.state || record.state_for_prompt || {},
        valid_actions: actions,
        rejected,
        chosen,
        dpo: {
          prompt_messages: promptMessages,
          chosen_messages: [{ role: "assistant", content: chosen.assistant_content }],
          rejected_messages: [{ role: "assistant", content: rejectedContent }]
        },
        annotator_notes: draft.notes.trim()
      };
    }

    function setRecords(records, errors, source) {
      app.records = records;
      app.parseErrors = errors;
      app.source = source;
      app.selected = Math.max(0, records.length - 1);
      render();
    }

    function renderStats() {
      const totalTokens = app.records.reduce((sum, record) => {
        const usage = usageOf(record);
        return sum + Number(usage.total_tokens || 0);
      }, 0);
      const actions = app.records.filter((record) => isModelStep(record) && actionOf(record) !== "none").length;
      el.recordCount.textContent = String(app.records.length);
      el.errorCount.textContent = String(app.records.filter((record) => record.error || resultStatus(record) === "error").length + app.parseErrors.length);
      el.actionCount.textContent = String(actions);
      el.tokenCount.textContent = totalTokens ? String(totalTokens) : "0";
      el.sourceLabel.textContent = app.source || "No trace loaded";
    }

    function renderSteps() {
      if (!app.records.length) {
        el.steps.innerHTML = '<div class="empty">Load a trace log.</div>';
        return;
      }
      el.steps.innerHTML = app.records.map((record, index) => {
        const status = resultStatus(record);
        const state = stateTypeOf(record);
        const action = displayActionOf(record);
        const active = index === app.selected ? " active" : "";
        return `
          <button class="step${active}" type="button" data-index="${index}">
            <span class="step-num">${escapeHtml(displayStepLabel(record, index))}</span>
            <span class="step-main">
              <strong>${escapeHtml(state)} -> ${escapeHtml(action)}</strong>
              <span>${escapeHtml(displaySubtext(record))}</span>
            </span>
            <span class="status ${statusClass(status)}">${escapeHtml(status)}</span>
          </button>
        `;
      }).join("");
    }

    function renderMetrics(record) {
      if (!record) {
        el.metricStep.textContent = "-";
        el.metricState.textContent = "-";
        el.metricAction.textContent = "-";
        el.metricResult.textContent = "-";
        el.metricReasoning.textContent = "-";
        return;
      }
      const reasoning = splitReasoning(record).reasoning;
      el.metricStep.textContent = displayStepLabel(record, app.selected);
      el.metricState.textContent = stateTypeOf(record);
      el.metricAction.textContent = displayActionOf(record);
      el.metricResult.textContent = resultStatus(record);
      el.metricReasoning.textContent = reasoning ? `${reasoning.length} chars` : "none";
    }

    function renderOverview(record) {
      const attempt = finalAttempt(record);
      const usage = usageOf(record);
      return `
        <dl class="kv"><dt>Record kind</dt><dd>${escapeHtml(recordKind(record))}</dd></dl>
        <dl class="kv"><dt>Phase</dt><dd>${escapeHtml(record.phase || "model_step")}</dd></dl>
        <dl class="kv"><dt>Step</dt><dd>${escapeHtml(displayStepLabel(record, app.selected))}</dd></dl>
        <dl class="kv"><dt>Event</dt><dd>${escapeHtml(record.event || "")}</dd></dl>
        <dl class="kv"><dt>State type</dt><dd>${escapeHtml(stateTypeOf(record))}</dd></dl>
        <dl class="kv"><dt>Action id</dt><dd><code>${escapeHtml(actionIdOf(record) || "not logged")}</code></dd></dl>
        <dl class="kv"><dt>Action</dt><dd><code>${escapeHtml(displayActionOf(record))}</code></dd></dl>
        <dl class="kv"><dt>Args</dt><dd><code>${escapeHtml(pretty(argsOf(record)))}</code></dd></dl>
        <dl class="kv"><dt>Rationale</dt><dd>${escapeHtml(attempt?.normalized?.rationale || "")}</dd></dl>
        <dl class="kv"><dt>Validation</dt><dd>${escapeHtml(attempt?.validation_error || "accepted")}</dd></dl>
        <dl class="kv"><dt>Result</dt><dd>${escapeHtml(resultStatus(record))}</dd></dl>
        <dl class="kv"><dt>Tokens</dt><dd>${escapeHtml(pretty(usage))}</dd></dl>
      `;
    }

    function renderReplay(record) {
      const attempt = finalAttempt(record);
      const chosenByModel = selectedLegalAction(record);
      const actions = validActionsOf(record);
      return `
        <div class="replay-grid">
          <div class="block">
            <h2>Readable game state</h2>
            ${renderReadableState(record)}
          </div>
          <div class="block">
            <h2>Model decision</h2>
            <div class="state-summary">
              <div class="state-card">
                <h3>${escapeHtml(actionIdOf(record) || displayActionOf(record))}</h3>
                <p>${escapeHtml(attempt?.normalized?.rationale || "No rationale logged.")}</p>
              </div>
              <div class="state-card">
                <h3>Reasoning</h3>
                <p>${escapeHtml(splitReasoning(record, attempt).reasoning || "No emitted reasoning logged for this step.")}</p>
              </div>
              ${chosenByModel ? renderActionOption(chosenByModel, actionIdOf(record), false) : ""}
            </div>
          </div>
        </div>
        <div class="block" style="margin-top:12px">
          <h2>Valid actions shown to model</h2>
          <div class="action-list">
            ${actions.length ? actions.map((action) => renderActionOption(action, actionIdOf(record), false)).join("") : '<div class="empty">No valid actions were logged for this step.</div>'}
          </div>
        </div>
      `;
    }

    function renderDpo(record) {
      if (!isModelStep(record)) {
        return '<div class="empty">DPO samples are only available for model decision records.</div>';
      }
      const draft = draftFor(record);
      const actions = validActionsOf(record);
      const rejected = rejectedDecision(record);
      const selectedId = draft.chosenActionId;
      const chosenAction = actions.find((action) => action.id === selectedId);
      const sameAction = selectedId && selectedId === rejected.action_id;
      return `
        <div class="annotation-grid">
          <div class="block">
            <h2>Rejected model decision</h2>
            <div class="state-summary">
              <div class="state-card">
                <h3>${escapeHtml(rejected.action_id || rejected.action || "No action")}</h3>
                <p>${escapeHtml(rejected.rationale || "No rationale logged.")}</p>
              </div>
              <div class="state-card">
                <h3>Model reasoning</h3>
                <p>${escapeHtml(rejected.reasoning || "No emitted reasoning logged for this step.")}</p>
              </div>
              <div class="state-card">
                <h3>Readable state</h3>
                <ul>${stateSections(record).flatMap((section) => section.lines.slice(0, 3).map((line) => `${section.title}: ${line}`)).slice(0, 8).map((line) => `<li>${escapeHtml(line)}</li>`).join("")}</ul>
              </div>
            </div>
          </div>
          <div class="block">
            <h2>Chosen human correction</h2>
            <div class="form-stack">
              <label class="form-row">Correct action
                <select id="dpoActionSelect">
                  <option value="">Choose a valid action...</option>
                  ${actions.map((action) => `<option value="${escapeHtml(action.id || "")}" ${action.id === selectedId ? "selected" : ""}>${escapeHtml(action.id || "")} - ${escapeHtml(action.summary || action.tool || "")}</option>`).join("")}
                </select>
              </label>
              <label class="form-row">Short rationale
                <input id="dpoRationale" type="text" value="${escapeHtml(draft.rationale)}" placeholder="Short public reason for the final JSON">
              </label>
              <label class="form-row">Human reasoning trace
                <textarea id="dpoReasoning" placeholder="Narrate the strategic reasoning that makes this action better.">${escapeHtml(draft.reasoning)}</textarea>
              </label>
              <label class="form-row">Annotator notes
                <input id="dpoNotes" type="text" value="${escapeHtml(draft.notes)}" placeholder="Optional private note about why this sample matters">
              </label>
              ${sameAction ? '<div class="state-card"><p>Chosen action matches the model action. This can still compare reasoning, but it is not an action preference pair.</p></div>' : ""}
              ${chosenAction ? renderActionOption(chosenAction, selectedId, false) : ""}
              <div class="save-row">
                <button id="saveDpo" type="button">Save DPO sample</button>
                <span id="dpoStatus" class="save-status">${escapeHtml(draft.status || "")}</span>
              </div>
            </div>
          </div>
        </div>
        <div class="block" style="margin-top:12px">
          <h2>Pick from valid actions</h2>
          <div class="action-list">
            ${actions.length ? actions.map((action) => renderActionOption(action, selectedId, true)).join("") : '<div class="empty">No valid actions were logged for this step.</div>'}
          </div>
        </div>
      `;
    }

    function renderPrompt(record) {
      const list = attempts(record);
      return `
        <div class="attempts">${list.map((attempt, index) => `
          <button type="button" data-attempt="${index}" class="${index === list.length - 1 ? "active" : ""}">Attempt ${escapeHtml(attempt.attempt || index + 1)}</button>
        `).join("")}</div>
        <div id="attemptPrompt">${renderMessages(list[list.length - 1]?.request?.messages || [])}</div>
      `;
    }

    function renderMessages(messages) {
      if (!Array.isArray(messages) || !messages.length) {
        return '<div class="empty">Prompt messages were not logged for this record.</div>';
      }
      return messages.map((message, index) => `
        <div class="message">
          <div class="message-role"><span>${escapeHtml(message.role || "message")}</span><span>${index + 1}</span></div>
          <pre>${escapeHtml(message.content || "")}</pre>
        </div>
      `).join("");
    }

    function renderReasoning(record) {
      const list = attempts(record);
      return `
        <div class="split">
          <div class="block">
            <h2>Reasoning emitted by model</h2>
            <pre>${escapeHtml(splitReasoning(record, list[list.length - 1]).reasoning || "No emitted reasoning found for this step.")}</pre>
          </div>
          <div class="block">
            <h2>Final response text after reasoning</h2>
            <pre>${escapeHtml(splitReasoning(record, list[list.length - 1]).finalText || rawTextOf(record, list[list.length - 1]) || "")}</pre>
          </div>
        </div>
      `;
    }

    function renderAction(record) {
      const attempt = finalAttempt(record);
      return `
        <div class="split">
          <div class="block">
            <h2>Parsed and normalized</h2>
            <pre>${escapeHtml(pretty({
              parsed: attempt?.parsed || record.parsed,
              normalized: attempt?.normalized,
              validation_error: attempt?.validation_error
            }))}</pre>
          </div>
          <div class="block">
            <h2>Tool result</h2>
            <pre>${escapeHtml(pretty(record.result ?? record.error ?? null))}</pre>
          </div>
        </div>
      `;
    }

    function renderRaw(record) {
      return `
        <div class="split">
          <div class="block">
            <h2>Raw model text</h2>
            <pre>${escapeHtml(rawTextOf(record))}</pre>
          </div>
          <div class="block">
            <h2>Full trace record</h2>
            <pre>${escapeHtml(pretty(record))}</pre>
          </div>
        </div>
      `;
    }

    function renderDetails() {
      const record = app.records[app.selected];
      renderMetrics(record);
      if (!record) {
        el.details.innerHTML = '<div class="empty">Select a step.</div>';
        return;
      }
      if (app.activeTab === "overview") el.details.innerHTML = renderOverview(record);
      if (app.activeTab === "replay") el.details.innerHTML = renderReplay(record);
      if (app.activeTab === "dpo") el.details.innerHTML = renderDpo(record);
      if (app.activeTab === "prompt") el.details.innerHTML = renderPrompt(record);
      if (app.activeTab === "reasoning") el.details.innerHTML = renderReasoning(record);
      if (app.activeTab === "action") el.details.innerHTML = renderAction(record);
      if (app.activeTab === "state") el.details.innerHTML = `<div class="block"><h2>Game state</h2><pre>${escapeHtml(pretty(record.state || record.state_for_prompt || null))}</pre></div>`;
      if (app.activeTab === "result") el.details.innerHTML = `<div class="block"><h2>Action result</h2><pre>${escapeHtml(pretty(record.result ?? record.error ?? null))}</pre></div>`;
      if (app.activeTab === "raw") el.details.innerHTML = renderRaw(record);
    }

    function render() {
      renderStats();
      renderSteps();
      renderDetails();
      [...el.tabs.querySelectorAll("button")].forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === app.activeTab);
      });
    }

    async function loadLogsIndex() {
      try {
        const response = await fetch("/api/logs", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        app.serverAvailable = true;
        const logs = payload.logs || [];
        el.logSelect.innerHTML = logs.length
          ? logs.map((log) => `<option value="${escapeHtml(log.name)}">${escapeHtml(log.name)} (${escapeHtml(log.records)} records)</option>`).join("")
          : '<option value="">No logs found</option>';
        if (logs.length && !app.logName) {
          app.logName = logs[0].name;
          el.logSelect.value = app.logName;
          await loadServerLog(app.logName, true);
        } else if (app.logName) {
          el.logSelect.value = app.logName;
        }
      } catch {
        app.serverAvailable = false;
        el.logSelect.innerHTML = '<option value="">Open via server for log list</option>';
      }
    }

    async function loadServerLog(name, keepSelection = false) {
      if (!name) return;
      const oldIndex = app.selected;
      const oldKey = recordIdentity(app.records[app.selected], oldIndex);
      const response = await fetch(`/api/logs/${encodeURIComponent(name)}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`Unable to load ${name}`);
      const text = await response.text();
      const parsed = parseJsonl(text);
      app.logName = name;
      setRecords(parsed.records, parsed.errors, `logs/${name}`);
      if (keepSelection) {
        const index = app.records.findIndex((record, nextIndex) => recordIdentity(record, nextIndex) === oldKey);
        if (index >= 0) {
          app.selected = index;
        } else if (oldIndex >= 0 && oldIndex < app.records.length) {
          app.selected = oldIndex;
        }
      }
      render();
    }

    async function refresh() {
      if (app.serverAvailable && app.logName) {
        await loadServerLog(app.logName, true);
      } else {
        await loadLogsIndex();
      }
    }

    function moveSelection(delta) {
      if (!app.records.length) return;
      let next = app.selected;
      for (;;) {
        next += delta;
        if (next < 0 || next >= app.records.length) return;
        if (!app.modelOnly || isModelStep(app.records[next])) {
          app.selected = next;
          render();
          return;
        }
      }
    }

    function updateDpoDraftFromFields(record) {
      const draft = draftFor(record);
      const actionSelect = document.getElementById("dpoActionSelect");
      const rationale = document.getElementById("dpoRationale");
      const reasoning = document.getElementById("dpoReasoning");
      const notes = document.getElementById("dpoNotes");
      if (actionSelect) draft.chosenActionId = actionSelect.value;
      if (rationale) draft.rationale = rationale.value;
      if (reasoning) draft.reasoning = reasoning.value;
      if (notes) draft.notes = notes.value;
      return draft;
    }

    function setDpoStatus(record, text, kind = "") {
      const draft = draftFor(record);
      draft.status = text;
      const status = document.getElementById("dpoStatus");
      if (status) {
        status.textContent = text;
        status.className = `save-status ${kind}`.trim();
      }
    }

    async function saveDpoAnnotation() {
      const record = app.records[app.selected];
      if (!record) return;
      try {
        updateDpoDraftFromFields(record);
        setDpoStatus(record, "Saving...");
        const payload = buildDpoAnnotation(record);
        const response = await fetch("/api/dpo-annotations", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const text = await response.text();
        if (!response.ok) throw new Error(text || `HTTP ${response.status}`);
        const result = JSON.parse(text);
        const count = result?.annotation?.records;
        const path = result?.annotation?.path || "annotation file";
        setDpoStatus(record, `Saved${count ? ` #${count}` : ""} to ${path}`, "ok");
      } catch (error) {
        setDpoStatus(record, String(error.message || error), "err");
      }
    }

    el.steps.addEventListener("click", (event) => {
      const button = event.target.closest("[data-index]");
      if (!button) return;
      app.selected = Number(button.dataset.index);
      render();
    });

    el.tabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-tab]");
      if (!button) return;
      app.activeTab = button.dataset.tab;
      render();
    });

    el.details.addEventListener("click", (event) => {
      const actionButton = event.target.closest("[data-use-action-id]");
      if (actionButton) {
        const record = app.records[app.selected];
        setDraftAction(record, actionButton.dataset.useActionId || "");
        renderDetails();
        return;
      }
      if (event.target.closest("#saveDpo")) {
        saveDpoAnnotation();
        return;
      }
      const button = event.target.closest("[data-attempt]");
      if (!button) return;
      const record = app.records[app.selected];
      const attempt = attempts(record)[Number(button.dataset.attempt)];
      document.getElementById("attemptPrompt").innerHTML = renderMessages(attempt?.request?.messages || []);
      [...el.details.querySelectorAll("[data-attempt]")].forEach((item) => item.classList.toggle("active", item === button));
    });

    el.details.addEventListener("input", (event) => {
      if (!event.target.closest("#dpoActionSelect, #dpoRationale, #dpoReasoning, #dpoNotes")) return;
      const record = app.records[app.selected];
      updateDpoDraftFromFields(record);
    });

    el.details.addEventListener("change", (event) => {
      if (!event.target.closest("#dpoActionSelect")) return;
      const record = app.records[app.selected];
      const previousRationale = draftFor(record).rationale.trim();
      updateDpoDraftFromFields(record);
      if (!previousRationale) {
        const draft = draftFor(record);
        const action = validActionsOf(record).find((item) => item.id === draft.chosenActionId);
        if (action) draft.rationale = firstSentence(action.summary || action.id, 120);
      }
      renderDetails();
    });

    el.prevStep.addEventListener("click", () => moveSelection(-1));
    el.nextStep.addEventListener("click", () => moveSelection(1));

    el.modelOnly.addEventListener("change", () => {
      app.modelOnly = el.modelOnly.checked;
    });

    el.logSelect.addEventListener("change", async () => {
      app.logName = el.logSelect.value;
      await loadServerLog(app.logName);
    });

    el.refreshButton.addEventListener("click", () => {
      refresh().catch((error) => {
        el.sourceLabel.textContent = String(error);
      });
    });

    el.autoRefresh.addEventListener("change", () => {
      if (app.refreshTimer) {
        clearInterval(app.refreshTimer);
        app.refreshTimer = null;
      }
      if (el.autoRefresh.checked) {
        app.refreshTimer = setInterval(() => refresh().catch(() => {}), 2000);
      }
    });

    el.fileInput.addEventListener("change", async () => {
      const file = el.fileInput.files?.[0];
      if (!file) return;
      const text = await file.text();
      const parsed = parseJsonl(text);
      app.logName = "";
      setRecords(parsed.records, parsed.errors, file.name);
    });

    document.addEventListener("keydown", (event) => {
      const tagName = event.target?.tagName;
      if (tagName === "INPUT" || tagName === "TEXTAREA" || tagName === "SELECT") return;
      if (event.key === "ArrowLeft") moveSelection(-1);
      if (event.key === "ArrowRight") moveSelection(1);
    });

    loadLogsIndex().then(render).catch(render);
  </script>
</body>
</html>
