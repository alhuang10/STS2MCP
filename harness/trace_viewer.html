<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>STS2 Trace Viewer</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fa;
      --panel: #ffffff;
      --panel-soft: #f9fafc;
      --ink: #172033;
      --muted: #66758a;
      --line: #d5deea;
      --blue: #2563a7;
      --green: #2f855a;
      --orange: #b85c00;
      --red: #b42318;
      --purple: #6956b8;
      --shadow: 0 12px 34px rgba(19, 31, 49, 0.08);
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      letter-spacing: 0;
    }

    button,
    input,
    select {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      border-radius: 6px;
      padding: 8px 10px;
      cursor: pointer;
    }

    button:hover {
      border-color: #9fb1c8;
      background: #f7faff;
    }

    button.active {
      border-color: var(--blue);
      background: #eaf3ff;
      color: #174b82;
    }

    .app {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.92);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.2;
    }

    .subtitle {
      color: var(--muted);
      font-size: 13px;
      margin-top: 3px;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .control {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 13px;
    }

    .control select,
    .control input[type="file"] {
      max-width: 270px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 7px 8px;
      background: #fff;
      color: var(--ink);
    }

    .layout {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      gap: 16px;
      padding: 16px;
      max-width: 1560px;
      width: 100%;
      margin: 0 auto;
    }

    aside,
    main {
      min-width: 0;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .side {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      height: calc(100vh - 92px);
      position: sticky;
      top: 76px;
    }

    .side-head {
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
      margin-top: 10px;
    }

    .stat {
      border: 1px solid var(--line);
      background: #fff;
      border-radius: 6px;
      padding: 8px;
    }

    .stat b {
      display: block;
      font-size: 18px;
      line-height: 1.1;
    }

    .stat span {
      color: var(--muted);
      font-size: 12px;
    }

    .steps {
      overflow: auto;
      padding: 8px;
    }

    .step {
      display: grid;
      grid-template-columns: 38px minmax(0, 1fr) auto;
      gap: 8px;
      width: 100%;
      text-align: left;
      border-radius: 6px;
      margin: 0 0 6px;
      padding: 9px;
      align-items: center;
    }

    .step-num {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--muted);
    }

    .step-main {
      min-width: 0;
    }

    .step-main strong {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 13px;
    }

    .step-main span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      min-width: 44px;
      justify-content: center;
      border-radius: 999px;
      padding: 3px 7px;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
    }

    .status.ok {
      background: var(--green);
    }

    .status.err {
      background: var(--red);
    }

    .status.wait {
      background: var(--orange);
    }

    .status.unknown {
      background: #64748b;
    }

    .content {
      display: grid;
      gap: 14px;
    }

    .summary {
      padding: 16px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(0, 1fr));
      gap: 10px;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
      min-height: 74px;
      background: #fff;
    }

    .metric span {
      color: var(--muted);
      display: block;
      font-size: 12px;
      margin-bottom: 5px;
    }

    .metric b {
      display: block;
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 10px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
      overflow-x: auto;
    }

    .details-body {
      padding: 14px;
      min-height: 520px;
    }

    .split {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .block {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      min-width: 0;
    }

    .block h2 {
      margin: 0;
      padding: 10px 12px;
      font-size: 13px;
      border-bottom: 1px solid var(--line);
      background: #f4f7fb;
    }

    pre {
      margin: 0;
      padding: 12px;
      white-space: pre-wrap;
      overflow-wrap: anywhere;
      overflow: auto;
      max-height: 620px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.45;
      color: #d8e2f0;
      background: #111827;
    }

    .message {
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      margin-bottom: 10px;
      background: #fff;
    }

    .message-role {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 9px 11px;
      background: #f4f7fb;
      border-bottom: 1px solid var(--line);
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .message pre {
      max-height: 360px;
    }

    .attempts {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 12px;
    }

    .empty {
      border: 1px dashed #b7c3d3;
      color: var(--muted);
      background: #fbfcfe;
      border-radius: 8px;
      padding: 22px;
      text-align: center;
    }

    .kv {
      display: grid;
      grid-template-columns: 170px minmax(0, 1fr);
      gap: 8px;
      font-size: 13px;
      margin: 0 0 9px;
    }

    .kv dt {
      color: var(--muted);
    }

    .kv dd {
      margin: 0;
      overflow-wrap: anywhere;
    }

    @media (max-width: 1050px) {
      .layout,
      .split {
        grid-template-columns: 1fr;
      }

      .side {
        height: auto;
        position: static;
      }

      .steps {
        max-height: 340px;
      }

      .summary-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      header {
        display: grid;
      }

      .controls {
        justify-content: flex-start;
      }

      .summary-grid {
        grid-template-columns: 1fr;
      }

      .kv {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <div>
        <h1>STS2 Trace Viewer</h1>
        <div class="subtitle" id="sourceLabel">No trace loaded</div>
      </div>
      <div class="controls">
        <label class="control">Log
          <select id="logSelect">
            <option value="">No server logs found</option>
          </select>
        </label>
        <button id="refreshButton" type="button">Refresh</button>
        <label class="control">Auto
          <input id="autoRefresh" type="checkbox">
        </label>
        <label class="control">File
          <input id="fileInput" type="file" accept=".jsonl,application/jsonl,text/plain">
        </label>
      </div>
    </header>

    <div class="layout">
      <aside class="panel side">
        <div class="side-head">
          <div class="stats">
            <div class="stat"><b id="recordCount">0</b><span>records</span></div>
            <div class="stat"><b id="errorCount">0</b><span>errors</span></div>
            <div class="stat"><b id="actionCount">0</b><span>actions</span></div>
            <div class="stat"><b id="tokenCount">0</b><span>tokens</span></div>
          </div>
        </div>
        <div id="steps" class="steps">
          <div class="empty">Load a trace log.</div>
        </div>
      </aside>

      <main class="content">
        <section class="panel summary">
          <div class="summary-grid">
            <div class="metric"><span>Step</span><b id="metricStep">-</b></div>
            <div class="metric"><span>State</span><b id="metricState">-</b></div>
            <div class="metric"><span>Action</span><b id="metricAction">-</b></div>
            <div class="metric"><span>Result</span><b id="metricResult">-</b></div>
            <div class="metric"><span>Reasoning</span><b id="metricReasoning">-</b></div>
          </div>
        </section>

        <section class="panel">
          <div class="tabs" id="tabs">
            <button type="button" data-tab="overview" class="active">Overview</button>
            <button type="button" data-tab="prompt">Prompt</button>
            <button type="button" data-tab="reasoning">Reasoning</button>
            <button type="button" data-tab="action">Action</button>
            <button type="button" data-tab="state">State</button>
            <button type="button" data-tab="result">Result</button>
            <button type="button" data-tab="raw">Raw</button>
          </div>
          <div class="details-body" id="details">
            <div class="empty">Select a step.</div>
          </div>
        </section>
      </main>
    </div>
  </div>

  <script>
    const app = {
      records: [],
      parseErrors: [],
      selected: 0,
      activeTab: "overview",
      source: "",
      logName: "",
      serverAvailable: false,
      refreshTimer: null
    };

    const el = {
      sourceLabel: document.getElementById("sourceLabel"),
      logSelect: document.getElementById("logSelect"),
      refreshButton: document.getElementById("refreshButton"),
      autoRefresh: document.getElementById("autoRefresh"),
      fileInput: document.getElementById("fileInput"),
      recordCount: document.getElementById("recordCount"),
      errorCount: document.getElementById("errorCount"),
      actionCount: document.getElementById("actionCount"),
      tokenCount: document.getElementById("tokenCount"),
      steps: document.getElementById("steps"),
      tabs: document.getElementById("tabs"),
      details: document.getElementById("details"),
      metricStep: document.getElementById("metricStep"),
      metricState: document.getElementById("metricState"),
      metricAction: document.getElementById("metricAction"),
      metricResult: document.getElementById("metricResult"),
      metricReasoning: document.getElementById("metricReasoning")
    };

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function pretty(value) {
      if (value === undefined) return "";
      try {
        return JSON.stringify(value, null, 2);
      } catch {
        return String(value);
      }
    }

    function parseJsonl(text) {
      const records = [];
      const errors = [];
      text.split(/\r?\n/).forEach((line, index) => {
        if (!line.trim()) return;
        try {
          records.push(JSON.parse(line));
        } catch (error) {
          errors.push({ line: index + 1, error: String(error), text: line });
        }
      });
      return { records, errors };
    }

    function resultStatus(record) {
      if (record.error) return "error";
      const result = record.result;
      if (result && typeof result === "object") return result.status || "object";
      if (result === undefined || result === null) return "unknown";
      return typeof result;
    }

    function statusClass(status) {
      if (status === "ok" || status === "dry_run" || status === "stopped") return "ok";
      if (status === "wait") return "wait";
      if (status === "error") return "err";
      return "unknown";
    }

    function attempts(record) {
      const traceAttempts = record?.model_trace?.attempts;
      if (Array.isArray(traceAttempts) && traceAttempts.length) return traceAttempts;
      return [{
        attempt: 1,
        request: record.model_request,
        response: { usage: record.llm_usage },
        raw_text: record.model_text || "",
        parsed: record.parsed,
        normalized: {
          action: record.parsed?.action || record.parsed?.tool || "",
          args: record.parsed?.args || record.parsed?.arguments || {},
          rationale: record.parsed?.rationale || ""
        },
        validation_error: record.error || null
      }];
    }

    function finalAttempt(record) {
      const list = attempts(record);
      const finalIndex = Number(record?.model_trace?.final_attempt || list.length) - 1;
      return list[Math.max(0, Math.min(finalIndex, list.length - 1))] || list[0];
    }

    function actionOf(record) {
      const attempt = finalAttempt(record);
      return attempt?.normalized?.action || record.parsed?.action || record.parsed?.tool || "none";
    }

    function argsOf(record) {
      const attempt = finalAttempt(record);
      return attempt?.normalized?.args || record.parsed?.args || record.parsed?.arguments || {};
    }

    function actionIdOf(record) {
      const attempt = finalAttempt(record);
      return attempt?.normalized?.action_id || record.parsed?.action_id || "";
    }

    function usageOf(record) {
      const attempt = finalAttempt(record);
      return attempt?.response?.usage || record.llm_usage || {};
    }

    function rawTextOf(record, attempt = finalAttempt(record)) {
      const message = attempt?.response?.message;
      const content = message?.content;
      if (attempt?.raw_text) return attempt.raw_text;
      if (typeof content === "string") return content;
      if (Array.isArray(content)) {
        return content.map((part) => typeof part === "object" ? (part.text || "") : String(part)).join("");
      }
      return record.model_text || "";
    }

    function splitReasoning(record, attempt = finalAttempt(record)) {
      const message = attempt?.response?.message || {};
      const explicit = [
        message.reasoning_content,
        message.reasoning,
        message.thinking,
        message.think
      ].filter((value) => typeof value === "string" && value.trim()).join("\n\n");
      const text = rawTextOf(record, attempt);
      const thinkBlocks = [...String(text).matchAll(/<think>([\s\S]*?)<\/think>/gi)]
        .map((match) => match[1].trim())
        .filter(Boolean)
        .join("\n\n");
      const reasoning = explicit || thinkBlocks;
      const finalText = String(text).replace(/<think>[\s\S]*?<\/think>/gi, "").trim();
      return { reasoning, finalText };
    }

    function setRecords(records, errors, source) {
      app.records = records;
      app.parseErrors = errors;
      app.source = source;
      app.selected = Math.max(0, records.length - 1);
      render();
    }

    function renderStats() {
      const totalTokens = app.records.reduce((sum, record) => {
        const usage = usageOf(record);
        return sum + Number(usage.total_tokens || 0);
      }, 0);
      const actions = app.records.filter((record) => actionOf(record) !== "none").length;
      el.recordCount.textContent = String(app.records.length);
      el.errorCount.textContent = String(app.records.filter((record) => record.error || resultStatus(record) === "error").length + app.parseErrors.length);
      el.actionCount.textContent = String(actions);
      el.tokenCount.textContent = totalTokens ? String(totalTokens) : "0";
      el.sourceLabel.textContent = app.source || "No trace loaded";
    }

    function renderSteps() {
      if (!app.records.length) {
        el.steps.innerHTML = '<div class="empty">Load a trace log.</div>';
        return;
      }
      el.steps.innerHTML = app.records.map((record, index) => {
        const status = resultStatus(record);
        const state = record.state?.state_type || record.state_for_prompt?.state_type || "unknown";
        const action = actionOf(record);
        const active = index === app.selected ? " active" : "";
        return `
          <button class="step${active}" type="button" data-index="${index}">
            <span class="step-num">#${escapeHtml(record.step ?? index + 1)}</span>
            <span class="step-main">
              <strong>${escapeHtml(state)} -> ${escapeHtml(action)}</strong>
              <span>${escapeHtml(finalAttempt(record)?.normalized?.rationale || record.error || "")}</span>
            </span>
            <span class="status ${statusClass(status)}">${escapeHtml(status)}</span>
          </button>
        `;
      }).join("");
    }

    function renderMetrics(record) {
      if (!record) {
        el.metricStep.textContent = "-";
        el.metricState.textContent = "-";
        el.metricAction.textContent = "-";
        el.metricResult.textContent = "-";
        el.metricReasoning.textContent = "-";
        return;
      }
      const reasoning = splitReasoning(record).reasoning;
      el.metricStep.textContent = String(record.step ?? app.selected + 1);
      el.metricState.textContent = record.state?.state_type || record.state_for_prompt?.state_type || "unknown";
      el.metricAction.textContent = actionOf(record);
      el.metricResult.textContent = resultStatus(record);
      el.metricReasoning.textContent = reasoning ? `${reasoning.length} chars` : "none";
    }

    function renderOverview(record) {
      const attempt = finalAttempt(record);
      const usage = usageOf(record);
      return `
        <dl class="kv"><dt>Step</dt><dd>${escapeHtml(record.step ?? app.selected + 1)}</dd></dl>
        <dl class="kv"><dt>State type</dt><dd>${escapeHtml(record.state?.state_type || record.state_for_prompt?.state_type || "unknown")}</dd></dl>
        <dl class="kv"><dt>Action id</dt><dd><code>${escapeHtml(actionIdOf(record) || "not logged")}</code></dd></dl>
        <dl class="kv"><dt>Action</dt><dd><code>${escapeHtml(actionOf(record))}</code></dd></dl>
        <dl class="kv"><dt>Args</dt><dd><code>${escapeHtml(pretty(argsOf(record)))}</code></dd></dl>
        <dl class="kv"><dt>Rationale</dt><dd>${escapeHtml(attempt?.normalized?.rationale || "")}</dd></dl>
        <dl class="kv"><dt>Validation</dt><dd>${escapeHtml(attempt?.validation_error || "accepted")}</dd></dl>
        <dl class="kv"><dt>Result</dt><dd>${escapeHtml(resultStatus(record))}</dd></dl>
        <dl class="kv"><dt>Tokens</dt><dd>${escapeHtml(pretty(usage))}</dd></dl>
      `;
    }

    function renderPrompt(record) {
      const list = attempts(record);
      return `
        <div class="attempts">${list.map((attempt, index) => `
          <button type="button" data-attempt="${index}" class="${index === list.length - 1 ? "active" : ""}">Attempt ${escapeHtml(attempt.attempt || index + 1)}</button>
        `).join("")}</div>
        <div id="attemptPrompt">${renderMessages(list[list.length - 1]?.request?.messages || [])}</div>
      `;
    }

    function renderMessages(messages) {
      if (!Array.isArray(messages) || !messages.length) {
        return '<div class="empty">Prompt messages were not logged for this record.</div>';
      }
      return messages.map((message, index) => `
        <div class="message">
          <div class="message-role"><span>${escapeHtml(message.role || "message")}</span><span>${index + 1}</span></div>
          <pre>${escapeHtml(message.content || "")}</pre>
        </div>
      `).join("");
    }

    function renderReasoning(record) {
      const list = attempts(record);
      return `
        <div class="split">
          <div class="block">
            <h2>Reasoning emitted by model</h2>
            <pre>${escapeHtml(splitReasoning(record, list[list.length - 1]).reasoning || "No emitted reasoning found for this step.")}</pre>
          </div>
          <div class="block">
            <h2>Final response text after reasoning</h2>
            <pre>${escapeHtml(splitReasoning(record, list[list.length - 1]).finalText || rawTextOf(record, list[list.length - 1]) || "")}</pre>
          </div>
        </div>
      `;
    }

    function renderAction(record) {
      const attempt = finalAttempt(record);
      return `
        <div class="split">
          <div class="block">
            <h2>Parsed and normalized</h2>
            <pre>${escapeHtml(pretty({
              parsed: attempt?.parsed || record.parsed,
              normalized: attempt?.normalized,
              validation_error: attempt?.validation_error
            }))}</pre>
          </div>
          <div class="block">
            <h2>Tool result</h2>
            <pre>${escapeHtml(pretty(record.result ?? record.error ?? null))}</pre>
          </div>
        </div>
      `;
    }

    function renderRaw(record) {
      return `
        <div class="split">
          <div class="block">
            <h2>Raw model text</h2>
            <pre>${escapeHtml(rawTextOf(record))}</pre>
          </div>
          <div class="block">
            <h2>Full trace record</h2>
            <pre>${escapeHtml(pretty(record))}</pre>
          </div>
        </div>
      `;
    }

    function renderDetails() {
      const record = app.records[app.selected];
      renderMetrics(record);
      if (!record) {
        el.details.innerHTML = '<div class="empty">Select a step.</div>';
        return;
      }
      if (app.activeTab === "overview") el.details.innerHTML = renderOverview(record);
      if (app.activeTab === "prompt") el.details.innerHTML = renderPrompt(record);
      if (app.activeTab === "reasoning") el.details.innerHTML = renderReasoning(record);
      if (app.activeTab === "action") el.details.innerHTML = renderAction(record);
      if (app.activeTab === "state") el.details.innerHTML = `<div class="block"><h2>Game state</h2><pre>${escapeHtml(pretty(record.state || record.state_for_prompt || null))}</pre></div>`;
      if (app.activeTab === "result") el.details.innerHTML = `<div class="block"><h2>Action result</h2><pre>${escapeHtml(pretty(record.result ?? record.error ?? null))}</pre></div>`;
      if (app.activeTab === "raw") el.details.innerHTML = renderRaw(record);
    }

    function render() {
      renderStats();
      renderSteps();
      renderDetails();
      [...el.tabs.querySelectorAll("button")].forEach((button) => {
        button.classList.toggle("active", button.dataset.tab === app.activeTab);
      });
    }

    async function loadLogsIndex() {
      try {
        const response = await fetch("/api/logs", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        app.serverAvailable = true;
        const logs = payload.logs || [];
        el.logSelect.innerHTML = logs.length
          ? logs.map((log) => `<option value="${escapeHtml(log.name)}">${escapeHtml(log.name)} (${escapeHtml(log.records)} records)</option>`).join("")
          : '<option value="">No logs found</option>';
        if (logs.length && !app.logName) {
          app.logName = logs[0].name;
          el.logSelect.value = app.logName;
          await loadServerLog(app.logName, true);
        } else if (app.logName) {
          el.logSelect.value = app.logName;
        }
      } catch {
        app.serverAvailable = false;
        el.logSelect.innerHTML = '<option value="">Open via server for log list</option>';
      }
    }

    async function loadServerLog(name, keepSelection = false) {
      if (!name) return;
      const oldStep = app.records[app.selected]?.step;
      const response = await fetch(`/api/logs/${encodeURIComponent(name)}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`Unable to load ${name}`);
      const text = await response.text();
      const parsed = parseJsonl(text);
      app.logName = name;
      setRecords(parsed.records, parsed.errors, `logs/${name}`);
      if (keepSelection && oldStep !== undefined) {
        const index = app.records.findIndex((record) => record.step === oldStep);
        if (index >= 0) app.selected = index;
      }
      render();
    }

    async function refresh() {
      if (app.serverAvailable && app.logName) {
        await loadServerLog(app.logName, true);
      } else {
        await loadLogsIndex();
      }
    }

    el.steps.addEventListener("click", (event) => {
      const button = event.target.closest("[data-index]");
      if (!button) return;
      app.selected = Number(button.dataset.index);
      render();
    });

    el.tabs.addEventListener("click", (event) => {
      const button = event.target.closest("[data-tab]");
      if (!button) return;
      app.activeTab = button.dataset.tab;
      render();
    });

    el.details.addEventListener("click", (event) => {
      const button = event.target.closest("[data-attempt]");
      if (!button) return;
      const record = app.records[app.selected];
      const attempt = attempts(record)[Number(button.dataset.attempt)];
      document.getElementById("attemptPrompt").innerHTML = renderMessages(attempt?.request?.messages || []);
      [...el.details.querySelectorAll("[data-attempt]")].forEach((item) => item.classList.toggle("active", item === button));
    });

    el.logSelect.addEventListener("change", async () => {
      app.logName = el.logSelect.value;
      await loadServerLog(app.logName);
    });

    el.refreshButton.addEventListener("click", () => {
      refresh().catch((error) => {
        el.sourceLabel.textContent = String(error);
      });
    });

    el.autoRefresh.addEventListener("change", () => {
      if (app.refreshTimer) {
        clearInterval(app.refreshTimer);
        app.refreshTimer = null;
      }
      if (el.autoRefresh.checked) {
        app.refreshTimer = setInterval(() => refresh().catch(() => {}), 2000);
      }
    });

    el.fileInput.addEventListener("change", async () => {
      const file = el.fileInput.files?.[0];
      if (!file) return;
      const text = await file.text();
      const parsed = parseJsonl(text);
      app.logName = "";
      setRecords(parsed.records, parsed.errors, file.name);
    });

    loadLogsIndex().then(render).catch(render);
  </script>
</body>
</html>
